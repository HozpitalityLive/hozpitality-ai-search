version: "3"

services:

  ai-search:

    build: .

    container_name: hozpitality_ai

    ports:
      - "8001:8001"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all